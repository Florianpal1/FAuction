name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Install MLang to local repository
        run: |
          mkdir -p libs
          curl -L -o libs/mlang-1.0.0.jar https://github.com/seetch/MLang/releases/download/1.0.0/mlang-1.0.0.jar
          mvn install:install-file -Dfile=libs/mlang-1.0.0.jar -DgroupId=me.seetch -DartifactId=mlang -Dversion=1.0.0 -Dpackaging=jar -q
      - name: Build with Maven
        run: mvn -B package --file pom.xml
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Install MLang to local repository
        run: |
          mkdir -p libs
          curl -L -o libs/mlang-1.0.0.jar https://github.com/seetch/MLang/releases/download/1.0.0/mlang-1.0.0.jar
          mvn install:install-file -Dfile=libs/mlang-1.0.0.jar -DgroupId=me.seetch -DartifactId=mlang -Dversion=1.0.0 -Dpackaging=jar -q
      - name: Publish package
        run: mvn -U -fn --batch-mode deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
